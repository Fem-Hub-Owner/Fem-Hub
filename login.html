<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fem Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 2rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0 8px 25px rgba(107, 63, 160, 0.15);
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .auth-form input {
            padding: 12px;
            border: 2px solid #ff69b4;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .auth-form input:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.4);
            border-color: #d81b60;
        }
        .auth-btn {
            padding: 12px;
            background: linear-gradient(90deg, #ff69b4, #d81b60);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(216, 27, 96, 0.3);
        }
        .toggle-form {
            text-align: center;
            color: #666;
            margin-top: 1rem;
        }
        .toggle-form a {
            color: #d81b60;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }
        .error {
            color: #d81b60;
            padding: 10px;
            background: #ffe0f5;
            border-radius: 5px;
            margin-bottom: 1rem;
            display: none;
        }
        .success {
            color: #6b3fa0;
            padding: 10px;
            background: #f5e0ff;
            border-radius: 5px;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">✨ Fem Hub ✨</a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="login.html" class="active">Login</a></li>
            </ul>
        </div>
    </nav>

    <div class="auth-container">
        <h2 style="text-align: center; color: #6b3fa0; margin-bottom: 1.5rem;">Fem Hub Login</h2>
        
        <div class="error" id="error"></div>
        <div class="success" id="success"></div>

        <!-- Signup Form -->
        <form class="auth-form" id="signupForm">
            <h3 style="color: #d81b60; text-align: center;">Create Account</h3>
            <input type="email" id="signupEmail" placeholder="Your Email" required>
            <input type="password" id="signupPassword" placeholder="Password (6+ characters)" required>
            <input type="password" id="signupPassword2" placeholder="Confirm Password" required>
            <button type="submit" class="auth-btn">Sign Up</button>
        </form>

        <!-- Login Form (hidden by default) -->
        <form class="auth-form" id="loginForm" style="display: none;">
            <h3 style="color: #d81b60; text-align: center;">Login</h3>
            <input type="email" id="loginEmail" placeholder="Your Email" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit" class="auth-btn">Login</button>
        </form>

        <div class="toggle-form">
            <p id="toggleText">Already have an account? <a onclick="toggleForm()">Login here</a></p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD3cIEPhSi9Ba2HU8A7U0KGDnx1b6fkC8k",
            authDomain: "fem-hub-461ab.firebaseapp.com",
            projectId: "fem-hub-461ab",
            storageBucket: "fem-hub-461ab.firebasestorage.app",
            messagingSenderId: "895912349918",
            appId: "1:895912349918:web:f7b5f0388d8f86c2ee724f",
            measurementId: "G-ZHT06VMRNN"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Check if user is already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                // User is logged in, redirect to appropriate page
                if (user.email === "sebastian.sattler2234@gmail.com") {
                    window.location.href = "admin.html";
                } else {
                    window.location.href = "dashboard.html";
                }
            }
        });

        function toggleForm() {
            const signupForm = document.getElementById('signupForm');
            const loginForm = document.getElementById('loginForm');
            const toggleText = document.getElementById('toggleText');
            
            if (signupForm.style.display === 'none') {
                signupForm.style.display = 'flex';
                loginForm.style.display = 'none';
                toggleText.innerHTML = 'Already have an account? <a onclick="toggleForm()">Login here</a>';
            } else {
                signupForm.style.display = 'none';
                loginForm.style.display = 'flex';
                toggleText.innerHTML = 'Don\'t have an account? <a onclick="toggleForm()">Sign up here</a>';
            }
        }

        // Sign Up
        document.getElementById('signupForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const password2 = document.getElementById('signupPassword2').value;

            if (password !== password2) {
                showError('Passwords do not match!');
                return;
            }

            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    showSuccess('Account created! Redirecting...');
                    setTimeout(() => {
                        if (email === "sebastian.sattler2234@gmail.com") {
                            window.location.href = "admin.html";
                        } else {
                            window.location.href = "dashboard.html";
                        }
                    }, 1500);
                })
                .catch((error) => {
                    showError(error.message);
                });
        });

        // Login
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    showSuccess('Logged in! Redirecting...');
                    setTimeout(() => {
                        if (email === "sebastian.sattler2234@gmail.com") {
                            window.location.href = "admin.html";
                        } else {
                            window.location.href = "dashboard.html";
                        }
                    }, 1500);
                })
                .catch((error) => {
                    showError(error.message);
                });
        });

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('success');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }
    </script>
</body>
</html>
