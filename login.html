<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fem Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 2rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0 8px 25px rgba(107, 63, 160, 0.15);
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .auth-form input {
            padding: 12px;
            border: 2px solid #ff69b4;
            border-radius: 8px;
            font-size: 1rem;
        }
        .auth-btn {
            padding: 12px;
            background: linear-gradient(90deg, #ff69b4, #d81b60);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        .error {
            color: #d81b60;
            padding: 10px;
            background: #ffe0f5;
            border-radius: 5px;
            margin-bottom: 1rem;
            display: none;
        }
        .success {
            color: #6b3fa0;
            padding: 10px;
            background: #f5e0ff;
            border-radius: 5px;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">✨ Fem Hub ✨</a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html" class="active">Login</a></li>
            </ul>
        </div>
    </nav>

    <div class="auth-container">
        <h2 style="text-align: center; color: #6b3fa0; margin-bottom: 1.5rem;">Fem Hub Login</h2>
        
        <div class="error" id="error"></div>
        <div class="success" id="success"></div>

        <form class="auth-form" id="signupForm">
            <h3 style="color: #d81b60; text-align: center;">Create Account</h3>
            <input type="email" id="signupEmail" placeholder="Your Email" required>
            <input type="password" id="signupPassword" placeholder="Password (6+ characters)" required>
            <input type="password" id="signupPassword2" placeholder="Confirm Password" required>
            <button type="submit" class="auth-btn">Sign Up</button>
        </form>

        <div style="text-align: center; color: #666; margin-top: 1rem;">
            <p>Already have an account? <a onclick="toggleForm()" style="color: #d81b60; cursor: pointer; font-weight: bold;">Login here</a></p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD3cIEPhSi9Ba2HU8A7U0KGDnx1b6fkC8k",
            authDomain: "fem-hub-461ab.firebaseapp.com",
            projectId: "fem-hub-461ab",
            storageBucket: "fem-hub-461ab.firebasestorage.app",
            messagingSenderId: "895912349918",
            appId: "1:895912349918:web:f7b5f0388d8f86c2ee724f",
            measurementId: "G-ZHT06VMRNN"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        document.getElementById('signupForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const password2 = document.getElementById('signupPassword2').value;

            if (password !== password2) {
                showError('Passwords do not match!');
                return;
            }

            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    showSuccess('Account created! Redirecting...');
                    setTimeout(() => {
                        if (email === "sebastian.sattler2234@gmail.com") {
                            window.location.href = "admin.html";
                        } else {
                            window.location.href = "dashboard.html";
                        }
                    }, 1500);
                })
                .catch((error) => {
                    showError(error.message);
                });
        });

        function showError(message) {
            document.getElementById('error').textContent = message;
            document.getElementById('error').style.display = 'block';
        }

        function showSuccess(message) {
            document.getElementById('success').textContent = message;
            document.getElementById('success').style.display = 'block';
        }
    </script>
</body>
</html>
